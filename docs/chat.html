<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cura-llm-local — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { arctic: {
      300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7',
    }}}}}
  </script>
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    code, pre, .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    body { background: #020617; color: #e2e8f0; }
    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .grid-bg {
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .msg-user   { background: rgba(59, 130, 246, 0.12); border-color: rgba(59, 130, 246, 0.3); }
    .msg-assist { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.10); }
    .blink::after { content: '▍'; animation: blink 1s steps(2) infinite; margin-left: 2px; opacity: 0.7; }
    @keyframes blink { 0%, 50% { opacity: 0.7; } 50.01%, 100% { opacity: 0; } }
    pre.code-block {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 8px; padding: 10px 12px;
      overflow-x: auto; font-size: 13px;
    }
    .feed::-webkit-scrollbar { width: 8px; }
    .feed::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); border-radius: 4px; }
    select, input.field {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 13px;
    }
    select:focus, input.field:focus { outline: none; border-color: #38bdf8; }

    /* Composer */
    .composer-wrap {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      padding: 12px 56px 12px 18px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      position: relative;
    }
    .composer-wrap:focus-within {
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }
    .composer-wrap textarea {
      width: 100%;
      background: transparent;
      border: 0;
      resize: none;
      color: #e2e8f0;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
      max-height: 200px;
    }
    .composer-wrap textarea::placeholder { color: #64748b; }
    .send-btn {
      position: absolute;
      right: 8px; bottom: 8px;
      width: 38px; height: 38px;
      border-radius: 999px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
    }
    .send-btn.send  { background: #0284c7; color: white; }
    .send-btn.send:hover  { background: #0ea5e9; }
    .send-btn.send:disabled { background: rgba(100,116,139,0.4); color: rgba(226,232,240,0.4); cursor: not-allowed; }
    .send-btn.stop  { background: #e11d48; color: white; }
    .send-btn.stop:hover { background: #f43f5e; }
    .dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; margin-right: 6px; }
    .dot.ok   { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); }
    .dot.bad  { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.6); }
    .dot.unk  { background: #94a3b8; }
  </style>
</head>
<body class="min-h-screen grid-bg">
  <div class="max-w-3xl mx-auto px-4 py-6 flex flex-col" style="min-height:100vh;">

    <header class="flex items-center justify-between mb-5">
      <h1 class="text-xl font-bold gradient-text flex items-center gap-2">
        <i class="fa-solid fa-microchip"></i> cura-llm-local · Chat
      </h1>
      <a href="./index.html" class="text-sm text-slate-400 hover:text-arctic-400 transition">
        <i class="fa-solid fa-arrow-left mr-1"></i> Docs
      </a>
    </header>

    <!-- Bar: model + status -->
    <div class="glass rounded-xl p-3 mb-3 flex flex-wrap items-center gap-3">
      <span id="conn" class="text-xs text-slate-400 flex items-center"><span class="dot unk"></span>Verbinde…</span>
      <select id="model" class="mono flex-1 min-w-[200px]"></select>
      <button id="reset" class="text-xs px-3 py-2 rounded-lg border border-slate-700 hover:border-rose-500 hover:text-rose-300 transition flex items-center gap-1.5">
        <i class="fa-solid fa-trash-can"></i> Chat leeren
      </button>
    </div>

    <!-- CORS / connection error box (hidden by default) -->
    <div id="err-box" class="hidden mb-3 rounded-xl border border-rose-500/40 bg-rose-500/10 text-rose-100 text-sm px-4 py-3">
      <div class="font-semibold mb-1 flex items-center gap-2">
        <i class="fa-solid fa-triangle-exclamation"></i> Verbindung zum LLM-Server fehlgeschlagen
      </div>
      <div id="err-text" class="text-rose-200/90 mb-2">—</div>
      <div class="text-rose-200/80 text-xs">
        Lösung: in <code class="mono">.env</code> <code class="mono">OLLAMA_ORIGINS=*</code> setzen, dann
        <code class="mono">docker compose down &amp;&amp; docker compose up -d</code> ausführen.
      </div>
    </div>

    <!-- Feed -->
    <main id="feed" class="feed glass rounded-xl p-4 flex-1 overflow-y-auto space-y-3" style="min-height: 320px;">
      <div class="text-center text-slate-500 text-sm py-6">
        Stelle deine Frage unten — Antworten kommen Wort für Wort.
      </div>
    </main>

    <!-- Composer -->
    <form id="composer" class="mt-3">
      <div class="composer-wrap">
        <textarea id="input" rows="1" placeholder="Frag was — Enter sendet, Shift+Enter für neue Zeile"></textarea>
        <button id="send" type="submit" class="send-btn send" aria-label="Senden">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
        <button id="stop" type="button" class="send-btn stop hidden" aria-label="Stoppen">
          <i class="fa-solid fa-stop"></i>
        </button>
      </div>
      <div class="text-center text-xs text-slate-600 mt-2">
        <i class="fa-regular fa-keyboard mr-1"></i> Enter senden · Shift+Enter Zeilenumbruch
      </div>
    </form>
  </div>

  <script>
    const ENDPOINT = 'http://localhost:11434';
    const $ = (id) => document.getElementById(id);
    const feed = $('feed'), input = $('input'), sendBtn = $('send'), stopBtn = $('stop');
    const modelEl = $('model'), connEl = $('conn'), errBox = $('err-box'), errText = $('err-text');

    const history = [];
    let abortController = null;

    function setConn(state, text) {
      connEl.innerHTML = `<span class="dot ${state}"></span>${text}`;
    }
    function showError(msg) {
      errText.textContent = msg;
      errBox.classList.remove('hidden');
    }
    function hideError() { errBox.classList.add('hidden'); }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function renderMessage(el, text) {
      const parts = text.split(/```/);
      el.innerHTML = parts.map((p, i) => {
        if (i % 2 === 1) return `<pre class="code-block mono">${escapeHtml(p.replace(/^\w*\n/, ''))}</pre>`;
        return escapeHtml(p).replace(/\n/g, '<br>');
      }).join('');
    }
    function addBubble(role, text = '') {
      const wrap = document.createElement('div');
      wrap.className = `border rounded-lg px-3 py-2 text-sm ${role === 'user' ? 'msg-user' : 'msg-assist'}`;
      const label = document.createElement('div');
      label.className = 'text-xs uppercase tracking-wide opacity-60 mb-1';
      label.textContent = role === 'user' ? 'Du' : (modelEl.value || 'Assistant');
      const body = document.createElement('div');
      body.className = 'whitespace-pre-wrap break-words';
      renderMessage(body, text);
      wrap.append(label, body);
      feed.appendChild(wrap);
      feed.scrollTop = feed.scrollHeight;
      return body;
    }

    async function loadModels() {
      try {
        const r = await fetch(ENDPOINT + '/api/tags');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const models = (data.models || []).map(m => m.name);
        modelEl.innerHTML = models.length
          ? models.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('')
          : '<option value="">— kein Modell installiert —</option>';
        if (!models.length) {
          setConn('bad', 'Kein Modell installiert');
          showError('Lade ein Modell mit:  docker exec ollama ollama pull llama3.2');
        } else {
          hideError();
          setConn('ok', `Verbunden · ${models.length} Modell${models.length > 1 ? 'e' : ''}`);
          // restore last selected model
          const last = localStorage.getItem('cura-llm-model');
          if (last && models.includes(last)) modelEl.value = last;
        }
      } catch (e) {
        setConn('bad', 'Nicht erreichbar');
        showError(e.message === 'Failed to fetch'
          ? 'Browser hat die Anfrage blockiert (vermutlich CORS).'
          : e.message);
      }
    }

    modelEl.addEventListener('change', () => localStorage.setItem('cura-llm-model', modelEl.value));

    $('reset').addEventListener('click', () => {
      history.length = 0;
      feed.innerHTML = '<div class="text-center text-slate-500 text-sm py-6">Chat geleert.</div>';
    });

    function setBusy(busy) {
      sendBtn.classList.toggle('hidden', busy);
      stopBtn.classList.toggle('hidden', !busy);
    }

    async function sendMessage(text) {
      if (!text.trim() || !modelEl.value) return;
      hideError();
      setBusy(true);
      input.value = ''; input.style.height = '';

      addBubble('user', text);
      history.push({ role: 'user', content: text });

      const assistantBody = addBubble('assistant', '');
      assistantBody.classList.add('blink');
      let acc = '';

      abortController = new AbortController();

      try {
        const res = await fetch(ENDPOINT + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: modelEl.value, messages: history, stream: true }),
          signal: abortController.signal,
        });
        if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + (await res.text()));

        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf('\n')) >= 0) {
            const line = buf.slice(0, nl).trim();
            buf = buf.slice(nl + 1);
            if (!line) continue;
            try {
              const j = JSON.parse(line);
              if (j.message?.content) {
                acc += j.message.content;
                renderMessage(assistantBody, acc);
                feed.scrollTop = feed.scrollHeight;
              }
            } catch { /* partial json */ }
          }
        }
        history.push({ role: 'assistant', content: acc });
      } catch (e) {
        if (e.name === 'AbortError') {
          if (acc) history.push({ role: 'assistant', content: acc });
        } else {
          assistantBody.remove();
          history.pop();
          showError(e.message === 'Failed to fetch'
            ? 'Browser hat die Anfrage blockiert (vermutlich CORS).'
            : e.message);
        }
      } finally {
        assistantBody.classList.remove('blink');
        abortController = null;
        setBusy(false);
        input.focus();
      }
    }

    $('composer').addEventListener('submit', (e) => { e.preventDefault(); sendMessage(input.value); });
    stopBtn.addEventListener('click', () => abortController?.abort());
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input.value); }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
      sendBtn.disabled = !input.value.trim();
    });
    sendBtn.disabled = true;

    loadModels();
    input.focus();
  </script>
</body>
</html>
